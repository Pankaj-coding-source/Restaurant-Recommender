<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1>Restaurant Recommendation System</h1>
        <form method="post">
            <div class="mb-3">
                <label for="cuisine" class="form-label">Enter your preferred cuisine (e.g., Indian, Chinese, Italian):</label>
                <input type="text" class="form-control" id="cuisine" name="cuisine" required>
            </div>
            <button type="submit" class="btn btn-primary">Get Recommendations</button>
        </form>
        {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
